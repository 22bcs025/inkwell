services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inkwell
      POSTGRES_USER: inkwell
      POSTGRES_PASSWORD: inkwell
    ports:
      - "5433:5432"
    volumes:
      - inkwell_pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkwell"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    command: mvn -f /app/pom.xml org.springframework.boot:spring-boot-maven-plugin:3.3.4:run -Dspring-boot.run.jvmArguments="-Dfile.encoding=UTF-8"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/inkwell
      DB_USERNAME: inkwell
      DB_PASSWORD: inkwell
      JWT_SECRET: dev-secret-key-not-for-production-must-be-at-least-256-bits-long-ok
      JWT_EXPIRATION_MS: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:4200
    volumes:
      - ./backend:/app:Z
      - maven_repo:/root/.m2
    ports:
      - "8080:8080"

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    depends_on:
      - app
    volumes:
      - ./frontend:/app:Z
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"

volumes:
  inkwell_pg_data_dev:
  maven_repo:
  frontend_node_modules:
