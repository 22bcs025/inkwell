name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend - Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: inkwell_test
          POSTGRES_USER: inkwell
          POSTGRES_PASSWORD: inkwell
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inkwell"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn test -B
        env:
          DB_URL: jdbc:postgresql://localhost:5432/inkwell_test
          DB_USERNAME: inkwell
          DB_PASSWORD: inkwell
          JWT_SECRET: ci-test-secret-key-not-for-production-must-be-at-least-256-bits-long
          JWT_EXPIRATION_MS: 3600000

      - name: Build jar (skip tests - already ran)
        working-directory: backend
        run: mvn package -DskipTests -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build:prod

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Smoke test - start stack
        run: |
          docker compose up -d
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/api/blogs; do sleep 3; done'
          echo "Backend is up"
          docker compose down
