spring:
  application:
    name: inkwell-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inkwell}
    username: ${DB_USERNAME:inkwell}
    password: ${DB_PASSWORD:inkwell}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    com.inkwell: INFO
