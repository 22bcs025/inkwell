spring:
  datasource:
    url: jdbc:h2:mem:inkwell_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-for-jwt-signing-must-be-at-least-256-bits-long-ok
    expiration-ms: 3600000
  cors:
    allowed-origins: http://localhost:4200

logging:
  level:
    com.inkwell: WARN
