services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inkwell
      POSTGRES_USER: inkwell
      POSTGRES_PASSWORD: inkwell
    ports:
      - "5433:5432"
    volumes:
      - inkwell_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkwell"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/inkwell
      DB_USERNAME: inkwell
      DB_PASSWORD: inkwell
      JWT_SECRET: dev-secret-key-not-for-production-must-be-at-least-256-bits-long-ok
      JWT_EXPIRATION_MS: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:4200
    ports:
      - "8080:8080"

  web:
    build:
      context: ./frontend
    depends_on:
      - app
    ports:
      - "4200:80"

volumes:
  inkwell_pg_data:
